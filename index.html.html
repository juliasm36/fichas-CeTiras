<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetiras — Fichas de Preço</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0a1628; --blue-dark:#0d2444; --blue-mid:#1a3a6b;
  --blue:#1e4d8c; --blue-light:#2563b0; --steel:#3b82c4;
  --ice:#e8f0fb; --ice2:#f0f5ff; --white:#ffffff;
  --gray:#64748b; --gray-light:#cbd5e1; --border:#c8d8e8;
  --text:#1e293b; --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,var(--navy) 0%,var(--blue-dark) 40%,#0f1e38 100%);min-height:100vh;font-family:'Barlow',sans-serif;color:var(--text);padding-bottom:60px}

/* HEADER */
.app-header{background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 36px;display:flex;align-items:center;gap:20px;backdrop-filter:blur(10px)}
.app-header img{height:48px;filter:brightness(0) invert(1);object-fit:contain}
.app-header-info{border-left:1px solid rgba(255,255,255,0.15);padding-left:18px;margin-left:4px}
.app-header-info strong{color:white;display:block;font-size:15px;font-weight:600}
.app-header-info span{color:rgba(255,255,255,0.4);font-size:12px}

.main{max-width:860px;margin:0 auto;padding:32px 20px 0}

/* TIPO */
.tipo-wrap{display:flex;gap:12px;margin-bottom:18px}
.tipo-btn{flex:1;padding:14px 18px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:var(--radius);color:rgba(255,255,255,0.45);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;text-align:left}
.tipo-btn .icon{font-size:20px;display:block;margin-bottom:3px}
.tipo-btn .sub{display:block;font-size:11px;font-family:'Barlow',sans-serif;font-weight:400;margin-top:2px;color:rgba(255,255,255,0.3)}
.tipo-btn:hover{border-color:rgba(255,255,255,0.25);color:white}
.tipo-btn.active{border-color:var(--steel);background:rgba(30,77,140,0.5);color:white}
.tipo-btn.active .sub{color:var(--steel)}

/* CARD */
.card{background:white;border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.clabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.clabel::after{content:'';flex:1;height:1px;background:var(--ice)}
.row{display:flex;gap:12px;margin-bottom:12px}
.row:last-child{margin-bottom:0}
.field{flex:1;display:flex;flex-direction:column;gap:5px}
.field.w140{flex:0 0 140px}
.field.w120{flex:0 0 120px}
label{font-size:11px;font-weight:600;color:var(--gray);letter-spacing:0.5px;text-transform:uppercase}
input[type="text"]{background:var(--ice2);border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(37,99,176,0.1)}

/* STRIPS */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sh .clabel{margin-bottom:0;flex:1}
.cctrl{display:flex;align-items:center;gap:8px}
.brnd{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--border);background:white;color:var(--blue);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-weight:300}
.brnd:hover{border-color:var(--blue);background:var(--ice)}
.cnum{font-size:14px;font-weight:700;color:var(--blue);min-width:18px;text-align:center}
.strip{background:var(--ice2);border:1.5px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px}
.stag{display:inline-flex;align-items:center;background:var(--blue);color:white;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border-radius:20px;margin-bottom:11px}
.strip .row{margin-bottom:9px}
.strip .row:last-child{margin-bottom:0}
.img-zone{border:1.5px dashed var(--gray-light);border-radius:7px;padding:9px 14px;cursor:pointer;position:relative;overflow:hidden;font-size:12px;color:var(--gray);text-align:center;transition:border-color .2s,background .2s;background:white}
.img-zone:hover{border-color:var(--blue-light);background:var(--ice);color:var(--blue)}
.img-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ipr{display:none;align-items:center;gap:9px;margin-top:7px}
.ipr img{width:52px;height:34px;object-fit:contain;border-radius:4px;border:1px solid var(--border);background:#f5f5f5}
.ipr span{font-size:11px;color:var(--gray);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bclr{background:none;border:none;color:var(--gray-light);cursor:pointer;font-size:13px;transition:color .2s;padding:0 3px}
.bclr:hover{color:#dc2626}
.cir{display:flex;gap:6px;align-items:center}
.cir input{flex:1}
.badd{background:var(--blue);color:white;border:none;border-radius:7px;padding:8px 13px;font-size:18px;cursor:pointer;transition:background .2s;line-height:1}
.badd:hover{background:var(--blue-light)}
.ctags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ctag{background:var(--blue);color:white;border-radius:20px;font-size:11px;padding:3px 10px 3px 12px;display:flex;align-items:center;gap:6px}
.ctag button{background:none;border:none;color:rgba(255,255,255,0.55);cursor:pointer;font-size:12px;line-height:1;padding:0;transition:color .2s}
.ctag button:hover{color:white}

/* ═══════════════════════════════
   SHEET PREVIEW
═══════════════════════════════ */
.preview-wrap{background:white;border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.plabel{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.plabel::after{content:'';flex:1;height:1px;background:var(--ice)}

#sheet-preview{
  background:white;
  font-family:'Barlow',sans-serif;
  padding:28px 32px;
}

/* Cabeçalho da ficha */
.fp-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
  padding-bottom:14px;
  border-bottom:2px solid var(--navy);
}
/* Logo MAIOR no cabeçalho da ficha */
.fp-logo{
  height:70px;       /* logo grande */
  width:200px;
  object-fit:contain;
  object-position:left center;
}
.fp-client{text-align:center}
.fp-client-lbl{
  font-size:9px;font-weight:600;font-style:italic;
  letter-spacing:2px;text-transform:uppercase;color:var(--gray);
  border-bottom:1px solid var(--text);padding-bottom:3px;margin-bottom:6px;
}
.fp-client-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:26px;font-weight:800;color:var(--navy);letter-spacing:1px;
}
.fp-date{
  font-size:11px;font-style:italic;color:var(--gray);
  text-align:right;align-self:flex-end;
}

/* Tira */
.fp-strip{
  display:flex;
  border:1px solid #b0c4d8;
  margin-bottom:8px;
  overflow:hidden;
  border-radius:3px;
}

/*
  FOTO — usa background-image + background-size:contain
  para mostrar a imagem inteira SEM cortar e SEM distorcer.
  Fundo cinza claro preenche o resto.
*/
.fp-photo{
  width:240px;
  height:100px;
  flex-shrink:0;
  border-right:1px solid #b0c4d8;
  background-color:#f0f4f8;
  background-repeat:no-repeat;
  background-position:center center;
  background-size:contain;   /* ← imagem inteira, sem corte, sem distorção */
}
/* fallback quando não tem foto */
.fp-photo-empty{
  width:240px;height:100px;flex-shrink:0;
  border-right:1px solid #b0c4d8;
  background:#f0f4f8;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#b0bec5;
}

/* Tabela de dados */
.fp-table{flex:1;display:flex;flex-direction:column}
.fp-row{display:flex;flex:1;border-bottom:1px solid #b0c4d8}
.fp-row:last-child{border-bottom:none}
.fp-row-label{
  width:130px;flex-shrink:0;padding:0 12px;
  background:#f4f7fb;border-right:1px solid #b0c4d8;
  display:flex;align-items:center;
  font-size:10px;font-weight:700;font-style:italic;
  text-transform:uppercase;color:var(--navy);letter-spacing:0.5px;
}
.fp-row-value{
  flex:1;padding:0 14px;
  display:flex;align-items:center;flex-wrap:wrap;gap:2px;
  font-size:13px;font-weight:500;color:var(--text);
}
.fp-row-value.multi{flex-direction:column;align-items:flex-start;justify-content:center;gap:1px}
.fp-row-value span{font-size:11px}

/* BOTÕES */
.btn-row{display:flex;gap:10px}
.bdl{flex:1;padding:14px 18px;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.bxls{background:var(--blue);color:white}
.bxls:hover{background:var(--blue-light);transform:translateY(-1px)}
.bpdf{background:var(--navy);color:white}
.bpdf:hover{background:var(--blue-dark);transform:translateY(-1px)}
.status{margin-top:10px;text-align:center;font-size:12px;min-height:16px;color:var(--gray)}
.status.ok{color:#16a34a;font-weight:600}
.status.err{color:#dc2626;font-weight:600}
</style>
</head>

let tipo='preco', stripCount=0, stripData=[];

function today(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
document.getElementById('data').value=today();

function setTipo(t){
  tipo=t;
  document.getElementById('btn-preco').classList.toggle('active',t==='preco');
  document.getElementById('btn-consumo').classList.toggle('active',t==='consumo');
  stripCount=0;stripData=[];
  document.getElementById('strips-container').innerHTML='';
  document.getElementById('strip-count').textContent='0';
  addStrip();updatePreview();
}
function maxStrips(){return tipo==='preco'?7:10;}

function addStrip(){
  if(stripCount>=maxStrips()){setStatus('Máximo de '+maxStrips()+' tiras.','err');return;}
  stripCount++;
  stripData.push({ref:'',price:'',priceLabel:'PREÇO (m)',consumo:[],imgData:null,imgName:''});
  renderStrips();updatePreview();
}
function removeStrip(){
  if(stripCount<=1)return;
  stripCount--;stripData.pop();renderStrips();updatePreview();
}

function renderStrips(){
  const c=document.getElementById('strips-container');
  c.innerHTML='';
  document.getElementById('strip-count').textContent=stripCount;
  for(let i=0;i<stripCount;i++){
    const d=stripData[i];
    const div=document.createElement('div');
    div.className='strip';
    let consumoHtml='';
    if(tipo==='consumo'){
      const tags=d.consumo.map((v,ci)=>`<div class="ctag">${esc(v)}<button onclick="rmConsumo(${i},${ci})">✕</button></div>`).join('');
      consumoHtml=`<div class="row"><div class="field"><label>Consumo (m²)</label>
        <div class="cir"><input type="text" id="ci-${i}" placeholder="Ex: 0,134 m²">
        <button class="badd" onclick="addConsumo(${i})">+</button></div>
        <div class="ctags" id="ct-${i}">${tags}</div>
      </div></div>`;
    }
    div.innerHTML=`
      <div class="stag">TIRA ${i+1}</div>
      <div class="row">
        <div class="field"><label>Referência</label>
          <input type="text" value="${esc(d.ref)}" placeholder="Ex: CH8.PL4" oninput="stripData[${i}].ref=this.value;updatePreview()">
        </div>
        <div class="field w120"><label>Preço</label>
          <input type="text" value="${esc(d.price)}" placeholder="7,50" oninput="stripData[${i}].price=this.value;updatePreview()">
        </div>
        <div class="field w120"><label>Tipo de preço</label>
          <input type="text" value="${esc(d.priceLabel)}" placeholder="PREÇO (m)" oninput="stripData[${i}].priceLabel=this.value;updatePreview()">
        </div>
      </div>
      ${consumoHtml}
      <div class="row"><div class="field"><label>Foto (opcional)</label>
        <div class="img-zone"><input type="file" accept="image/*" onchange="handleImg(event,${i})">📷 clique para adicionar foto</div>
        <div class="ipr" id="ipr-${i}">
          <img id="ith-${i}" src=""><span id="inm-${i}"></span>
          <button class="bclr" onclick="clearImg(${i})">✕</button>
        </div>
      </div></div>`;
    c.appendChild(div);
  }
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function addConsumo(i){const inp=document.getElementById(`ci-${i}`);const v=inp.value.trim();if(!v)return;stripData[i].consumo.push(v);inp.value='';renderStrips();updatePreview();}
function rmConsumo(si,ci){stripData[si].consumo.splice(ci,1);renderStrips();updatePreview();}

function handleImg(e,idx){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=(ev)=>{
    stripData[idx].imgData=ev.target.result;
    stripData[idx].imgName=file.name;
    document.getElementById(`ipr-${idx}`).style.display='flex';
    document.getElementById(`ith-${idx}`).src=ev.target.result;
    document.getElementById(`inm-${idx}`).textContent=file.name;
    updatePreview();
  };r.readAsDataURL(file);
}
function clearImg(idx){
  stripData[idx].imgData=null;stripData[idx].imgName='';
  document.getElementById(`ipr-${idx}`).style.display='none';
  updatePreview();
}

function updatePreview(){
  const cliente=document.getElementById('cliente').value||'—';
  const data=document.getElementById('data').value||'—';
  document.getElementById('prev-cliente').textContent=cliente.toUpperCase();
  document.getElementById('prev-data').textContent='DATA: '+data;

  const c=document.getElementById('prev-strips');
  c.innerHTML='';

  for(let i=0;i<stripCount;i++){
    const d=stripData[i];
    const div=document.createElement('div');
    div.className='fp-strip';

    // FOTO: usa background-image com background-size:contain
    // → imagem inteira visível, sem corte, sem distorção
    let photoEl;
    if(d.imgData){
      photoEl=`<div class="fp-photo" style="background-image:url('${d.imgData}')"></div>`;
    } else {
      photoEl=`<div class="fp-photo-empty">foto</div>`;
    }

    let rows=`
      <div class="fp-row">
        <div class="fp-row-label">Referência</div>
        <div class="fp-row-value">${esc(d.ref)||'—'}</div>
      </div>
      <div class="fp-row">
        <div class="fp-row-label">${esc(d.priceLabel||'PREÇO (m)')}</div>
        <div class="fp-row-value">${d.price?'R$ '+esc(d.price):'—'}</div>
      </div>`;

    if(tipo==='consumo'){
      const cvals=d.consumo.length
        ?d.consumo.map(v=>`<span>${esc(v)}</span>`).join('')
        :'<span>—</span>';
      rows+=`<div class="fp-row">
        <div class="fp-row-label">Consumo</div>
        <div class="fp-row-value multi">${cvals}</div>
      </div>`;
    }

    div.innerHTML=`${photoEl}<div class="fp-table">${rows}</div>`;
    c.appendChild(div);
  }
}

function setStatus(msg,type=''){
  const el=document.getElementById('status');
  el.textContent=msg;el.className='status '+(type||'');
}

/* EXCEL */
function b64AB(b64){const bin=atob(b64),b=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)b[i]=bin.charCodeAt(i);return b.buffer;}
const RP=[7,13,20,27,34,41,48];
const RC=[7,14,21,28,35,42,54,61,68,75];
function CR(r,c){return String.fromCharCode(65+c)+(r+1);}
function SV(ws,ref,val){if(!ws[ref])ws[ref]={};ws[ref].v=val;ws[ref].t='s';delete ws[ref].w;}

function generateExcel(){
  const cliente=document.getElementById('cliente').value.trim();
  const data=document.getElementById('data').value.trim();
  if(!cliente){setStatus('Informe o cliente.','err');return;}
  setStatus('Gerando Excel...','');
  try{
    const wb=XLSX.read(b64AB(tipo==='preco'?MODELO_PRECO:MODELO_CONSUMO),{type:'array',cellStyles:true});
    const ws=wb.Sheets['Plan1'];
    SV(ws,'F3',cliente.toUpperCase());
    SV(ws,'A6','DATA: '+data);
    if(tipo==='preco'){
      RP.forEach((row,i)=>{
        const d=i<stripCount?stripData[i]:null;
        SV(ws,CR(row+1,4),d?d.ref:'');
        SV(ws,CR(row+1,8),d&&d.price?'R$ '+d.price:'');
      });
    }else{
      RC.forEach((row,i)=>{
        const d=i<stripCount?stripData[i]:null;
        SV(ws,CR(row,6),d?d.ref:'');
        SV(ws,CR(row+2,6),d&&d.price?'R$ '+d.price:'');
        if(d&&d.priceLabel&&d.priceLabel!=='PREÇO (m)')SV(ws,CR(row+2,4),d.priceLabel);
        SV(ws,CR(row+4,6),d&&d.consumo[0]?d.consumo[0]:'');
        SV(ws,CR(row+5,6),d&&d.consumo[1]?d.consumo[1]:'');
      });
    }
    const slug=cliente.replace(/\s+/g,'_'),dt=data.replace(/\//g,'-');
    XLSX.writeFile(wb,`Ficha_${slug}_${dt}.xlsx`);
    setStatus('✓ Excel gerado!','ok');
  }catch(e){setStatus('Erro: '+e.message,'err');console.error(e);}
}

/* PDF */
async function generatePDF(){
  const cliente=document.getElementById('cliente').value.trim();
  const data=document.getElementById('data').value.trim();
  if(!cliente){setStatus('Informe o cliente.','err');return;}
  setStatus('Gerando PDF...','');
  try{
    const el=document.getElementById('sheet-preview');
    const canvas=await html2canvas(el,{
      scale:3,
      backgroundColor:'#ffffff',
      useCORS:true,
      allowTaint:true,
      logging:false
    });
    const imgData=canvas.toDataURL('image/png');
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pW=pdf.internal.pageSize.getWidth()-20;
    const pH=pdf.internal.pageSize.getHeight()-20;
    const ratio=canvas.width/canvas.height;
    const iW=pW;
    const iH=iW/ratio;
    if(iH<=pH){
      pdf.addImage(imgData,'PNG',10,10,iW,iH);
    } else {
      const pages=Math.ceil(iH/pH);
      for(let p=0;p<pages;p++){
        if(p>0)pdf.addPage();
        const srcY=(p*pH/iH)*canvas.height;
        const srcH=Math.min((pH/iH)*canvas.height,canvas.height-srcY);
        const pc=document.createElement('canvas');
        pc.width=canvas.width;pc.height=srcH;
        pc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,srcH,0,0,canvas.width,srcH);
        const ph=(srcH/canvas.height)*iH;
        pdf.addImage(pc.toDataURL('image/png'),'PNG',10,10,iW,ph);
      }
    }
    const slug=cliente.replace(/\s+/g,'_'),dt=data.replace(/\//g,'-');
    pdf.save(`Ficha_${slug}_${dt}.pdf`);
    setStatus('✓ PDF gerado!','ok');
  }catch(e){setStatus('Erro PDF: '+e.message,'err');console.error(e);}
}

addStrip();
