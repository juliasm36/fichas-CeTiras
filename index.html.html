<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cetiras · Gerador de Fichas de Preço</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
  --navy: #0a1628;
  --blue-dark: #0d2444;
  --blue: #1e4d8c;
  --blue-light: #2563b0;
  --steel: #3b82c4;
  --ice: #e8f0fb;
  --ice2: #f0f5ff;
  --border: #c8d8e8;
  --text: #1e293b;
  --gray: #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: linear-gradient(160deg, #0a1628 0%, #0d2444 40%, #0f1e38 100%);
  min-height: 100vh;
  color: var(--text);
}

/* HEADER */
.app-header {
  background: rgba(10,22,40,0.95);
  border-bottom: 1px solid rgba(59,130,196,0.3);
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.app-header img { height: 44px; filter: brightness(0) invert(1); }
.app-header-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* MAIN LAYOUT */
.app-main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 32px 24px;
  display: grid;
  grid-template-columns: 480px 1fr;
  gap: 28px;
  align-items: start;
}

/* CARDS */
.card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  overflow: hidden;
  margin-bottom: 20px;
}
.card-header {
  background: var(--navy);
  padding: 14px 20px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #fff;
  text-transform: uppercase;
}
.card-body { padding: 20px; }

/* TYPE SELECTOR */
.type-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.type-btn {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 16px 12px;
  cursor: pointer;
  text-align: center;
  color: rgba(255,255,255,0.7);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.type-btn:hover { border-color: var(--steel); color: #fff; background: rgba(59,130,196,0.15); }
.type-btn.active {
  background: var(--blue);
  border-color: var(--steel);
  color: #fff;
  box-shadow: 0 0 20px rgba(59,130,196,0.3);
}
.type-btn .type-icon { font-size: 22px; display: block; margin-bottom: 6px; }
.type-btn .type-sub { font-size: 10px; font-weight: 400; opacity: 0.75; letter-spacing: 0.3px; font-family: 'Barlow', sans-serif; }

/* FORM INPUTS */
.form-row { display: flex; gap: 12px; margin-bottom: 14px; }
.form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.form-group.w140 { flex: 0 0 140px; }
.form-label {
  font-size: 10px;
  font-weight: 700;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gray);
}
.form-input {
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  font-family: 'Barlow', sans-serif;
  color: var(--text);
  background: var(--ice2);
  transition: border-color 0.2s;
  outline: none;
}
.form-input:focus { border-color: var(--steel); background: #fff; }

/* TIRAS SECTION */
.qty-control {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.qty-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gray);
  text-transform: uppercase;
  flex: 1;
}
.qty-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: var(--ice2);
  color: var(--blue);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  line-height: 1;
}
.qty-btn:hover:not(:disabled) { background: var(--blue); color: #fff; border-color: var(--blue); }
.qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.qty-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--navy);
  min-width: 28px;
  text-align: center;
}

/* TIRA BLOCK */
.tira-block {
  border: 1.5px solid var(--border);
  border-radius: 8px;
  margin-bottom: 14px;
  overflow: hidden;
}
.tira-header {
  background: var(--navy);
  padding: 7px 14px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.7);
  text-transform: uppercase;
}
.tira-body { padding: 14px; background: var(--ice2); }

/* PHOTO UPLOAD */
.photo-upload-area {
  border: 2px dashed var(--border);
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  padding: 10px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.photo-upload-area:hover { border-color: var(--steel); background: var(--ice); }
.photo-upload-area.has-photo { padding: 0; }
.photo-upload-area img { max-width: 100%; max-height: 80px; object-fit: contain; display: block; }
.photo-upload-text { font-size: 11px; color: var(--gray); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; }
.photo-upload-text span { font-size: 18px; display: block; margin-bottom: 3px; }
.photo-remove {
  position: absolute; top: 4px; right: 4px;
  background: rgba(220,38,38,0.8); color: #fff;
  border: none; border-radius: 4px; padding: 2px 6px;
  font-size: 11px; cursor: pointer; font-weight: 700;
}

/* CONSUMO TAGS */
.consumo-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.consumo-input-row .form-input { flex: 1; }
.consumo-add-btn {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0 14px;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.consumo-add-btn:hover { background: var(--blue-light); }
.consumo-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.consumo-tag {
  background: var(--blue);
  color: #fff;
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  font-family: 'Barlow', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
.consumo-tag-remove {
  background: rgba(255,255,255,0.3);
  border: none;
  color: #fff;
  cursor: pointer;
  border-radius: 3px;
  padding: 0 4px;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.4;
}

/* ACTION BUTTONS */
.action-btns { display: flex; gap: 10px; margin-top: 4px; }
.btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.btn-excel { background: var(--blue); color: #fff; }
.btn-excel:hover { background: var(--blue-light); }
.btn-pdf { background: var(--navy); color: #fff; }
.btn-pdf:hover { background: var(--blue-dark); }
.msg { font-size: 12px; margin-top: 8px; text-align: center; font-family: 'Barlow', sans-serif; }
.msg.error { color: #dc2626; }
.msg.success { color: #16a34a; }

/* PREVIEW COLUMN */
.preview-wrapper {
  position: sticky;
  top: 88px;
}
.preview-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 10px;
}

/* FICHA SHEET */
#sheet-preview {
  background: #fff;
  width: 100%;
  padding: 24px 28px 28px;
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}

.fp-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding-bottom: 14px;
  border-bottom: 3px solid var(--navy);
  margin-bottom: 10px;
}
.fp-logo { height: 70px; width: 200px; object-fit: contain; object-position: left center; }
.fp-client-block { text-align: right; }
.fp-client-label {
  font-size: 10px;
  font-style: italic;
  color: var(--gray);
  font-family: 'Barlow', sans-serif;
  display: block;
  margin-bottom: 2px;
  border-bottom: 1px solid var(--gray);
  padding-bottom: 2px;
}
.fp-client-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: 1px;
}
.fp-date {
  font-size: 11px;
  font-style: italic;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  margin-bottom: 14px;
}

/* TIRA ROW IN FICHA */
.fp-tira {
  display: flex;
  border: 1px solid #b0c4d8;
  border-radius: 3px;
  margin-bottom: 8px;
  overflow: hidden;
}
.fp-photo {
  width: 240px;
  min-width: 240px;
  height: 100px;
  flex-shrink: 0;
  border-right: 1px solid #b0c4d8;
  background-color: #f0f4f8;
  background-repeat: no-repeat;
  background-position: center center;
  background-size: contain;
}
.fp-photo-empty {
  width: 240px;
  min-width: 240px;
  height: 100px;
  flex-shrink: 0;
  border-right: 1px solid #b0c4d8;
  background: #f4f7fb;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #b0c4d8;
  font-size: 11px;
  font-style: italic;
  font-family: 'Barlow', sans-serif;
  letter-spacing: 1px;
}
.fp-info { flex: 1; display: flex; flex-direction: column; }
.fp-row {
  flex: 1;
  display: flex;
  border-bottom: 1px solid #b0c4d8;
  min-height: 0;
}
.fp-row:last-child { border-bottom: none; }
.fp-row-label {
  width: 130px;
  min-width: 130px;
  background: #f4f7fb;
  padding: 0 12px;
  font-size: 9px;
  font-weight: 700;
  font-style: italic;
  text-transform: uppercase;
  color: var(--navy);
  font-family: 'Barlow', sans-serif;
  display: flex;
  align-items: center;
  border-right: 1px solid #b0c4d8;
  letter-spacing: 0.5px;
}
.fp-row-value {
  flex: 1;
  padding: 0 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  display: flex;
  align-items: center;
}
.fp-consumo-lines { display: flex; flex-direction: column; gap: 1px; }
.fp-consumo-line { font-size: 11px; line-height: 1.5; }
</style>

<main class="app-main">
  <!-- LEFT COLUMN: CONTROLS -->
  <div class="left-col">

    <!-- Type Selector -->
    <div class="type-selector">
      <button class="type-btn active" id="btn-preco" onclick="setType('preco')">
        <span class="type-icon">💰</span>
        SÓ COM PREÇO
        <div class="type-sub">referência + preço</div>
      </button>
      <button class="type-btn" id="btn-consumo" onclick="setType('consumo')">

    <div class="card">
      <div class="card-header">Dados Gerais</div>

        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Tiras</div>
      <div class="card-body">
        <div class="qty-control">
          <span class="qty-label">Quantidade de tiras</span>
          <button class="qty-btn" id="btn-minus" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qty-display">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <div id="tiras-container"></div>
      </div>
    </div>

    <!-- Export Buttons -->
    <div class="card">
      <div class="card-body">
        <div class="action-btns">
          <button class="btn btn-excel" onclick="downloadExcel()">⬇ Baixar Excel</button>
          <button class="btn btn-pdf" onclick="downloadPDF()">⬇ Baixar PDF</button>
        </div>
        <div id="msg-area"></div>
      </div>
    </div>

  </div>

let currentType = 'preco';
let tirasData = [];
let qty = 1;

// Init
function init() {
  const today = new Date();
  const dd = String(today.getDate()).padStart(2, '0');
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const yyyy = today.getFullYear();
  document.getElementById('inp-data').value = dd + '/' + mm + '/' + yyyy;
  setType('preco');
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-preco').classList.toggle('active', t === 'preco');
  document.getElementById('btn-consumo').classList.toggle('active', t === 'consumo');
  qty = 1;
  tirasData = [newTira()];
  renderTiras();
  renderPreview();
}

function newTira() {
  return { ref: '', preco: '', tipoPreco: 'PREÇO (m)', foto: null, consumos: [], consumoInput: '' };
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  while (tirasData.length < qty) tirasData.push(newTira());
  tirasData.length = qty;
  document.getElementById('qty-display').textContent = qty;
  document.getElementById('btn-minus').disabled = qty <= 1;
  renderTiras();
  renderPreview();
}

function renderTiras() {
  const container = document.getElementById('tiras-container');
  container.innerHTML = '';
  for (let i = 0; i < qty; i++) {
    container.appendChild(buildTiraBlock(i));
  }
  document.getElementById('qty-display').textContent = qty;
  document.getElementById('btn-minus').disabled = qty <= 1;
}

function buildTiraBlock(i) {
  const t = tirasData[i];
  const div = document.createElement('div');
  div.className = 'tira-block';
  div.id = 'tira-block-' + i;

  let consumoHtml = '';
  if (currentType === 'consumo') {
    const tags = (t.consumos || []).map((c, ci) =>
      `<span class="consumo-tag">${c}<button class="consumo-tag-remove" onclick="removeConsumo(${i},${ci})">×</button></span>`
    ).join('');
    consumoHtml = `
      <div class="form-group" style="margin-top:10px;">
        <label class="form-label">Consumo (m²)</label>
        <div class="consumo-input-row">
          <input type="text" class="form-input" id="consumo-inp-${i}" placeholder="Ex: TIRA MARROM: 0,07 m²" style="font-size:12px;">
          <button class="consumo-add-btn" onclick="addConsumo(${i})">+</button>
        </div>
        <div class="consumo-tags" id="consumo-tags-${i}">${tags}</div>
      </div>`;
  }

  div.innerHTML = `
    <div class="tira-header">TIRA ${i + 1}</div>
    <div class="tira-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Referência</label>
          <input type="text" class="form-input" id="ref-${i}" value="${escHtml(t.ref)}" placeholder="Ex: CH8.PL4" oninput="updateTira(${i},'ref',this.value)">
        </div>
        <div class="form-group w140">
          <label class="form-label">Preço</label>
          <input type="text" class="form-input" id="preco-${i}" value="${escHtml(t.preco)}" placeholder="7,50" oninput="updateTira(${i},'preco',this.value)">
        </div>
        <div class="form-group w140">
          <label class="form-label">Tipo de Preço</label>
          <input type="text" class="form-input" id="tipo-${i}" value="${escHtml(t.tipoPreco)}" placeholder="PREÇO (m)" oninput="updateTira(${i},'tipoPreco',this.value)">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Foto (opcional)</label>
        <div class="photo-upload-area ${t.foto ? 'has-photo' : ''}" id="photo-area-${i}" onclick="triggerPhoto(${i})">
          ${t.foto
            ? `<img src="${t.foto}" alt="foto"><button class="photo-remove" onclick="event.stopPropagation();removePhoto(${i})">✕</button>`
            : `<div class="photo-upload-text"><span>📷</span>clique para adicionar foto</div>`}
        </div>
        <input type="file" id="photo-input-${i}" accept="image/*" style="display:none" onchange="handlePhoto(${i}, this)">
      </div>
      ${consumoHtml}
    </div>`;
  return div;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateTira(i, field, val) {
  tirasData[i][field] = val;
  renderPreview();
}

function triggerPhoto(i) {
  document.getElementById('photo-input-' + i).click();
}

function handlePhoto(i, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    tirasData[i].foto = e.target.result;
    const area = document.getElementById('photo-area-' + i);
    area.className = 'photo-upload-area has-photo';
    area.innerHTML = `<img src="${e.target.result}" alt="foto"><button class="photo-remove" onclick="event.stopPropagation();removePhoto(${i})">✕</button>`;
    renderPreview();
  };
  reader.readAsDataURL(file);
}

function removePhoto(i) {
  tirasData[i].foto = null;
  const area = document.getElementById('photo-area-' + i);
  area.className = 'photo-upload-area';
  area.innerHTML = `<div class="photo-upload-text"><span>📷</span>clique para adicionar foto</div>`;
  renderPreview();
}

function addConsumo(i) {
  const inp = document.getElementById('consumo-inp-' + i);
  const val = inp.value.trim();
  if (!val) return;
  tirasData[i].consumos.push(val);
  inp.value = '';
  // rebuild just tags
  const tagsDiv = document.getElementById('consumo-tags-' + i);
  tagsDiv.innerHTML = tirasData[i].consumos.map((c, ci) =>
    `<span class="consumo-tag">${escHtml(c)}<button class="consumo-tag-remove" onclick="removeConsumo(${i},${ci})">×</button></span>`
  ).join('');
  renderPreview();
}

function removeConsumo(i, ci) {
  tirasData[i].consumos.splice(ci, 1);
  const tagsDiv = document.getElementById('consumo-tags-' + i);
  tagsDiv.innerHTML = tirasData[i].consumos.map((c, cj) =>
    `<span class="consumo-tag">${escHtml(c)}<button class="consumo-tag-remove" onclick="removeConsumo(${i},${cj})">×</button></span>`
  ).join('');
  renderPreview();
}

/* ===================== PREVIEW ===================== */
function renderPreview() {
  const cliente = (document.getElementById('inp-cliente').value || '').toUpperCase();
  const data = document.getElementById('inp-data').value || '';
  const sheet = document.getElementById('sheet-preview');

  let tirasHtml = tirasData.slice(0, qty).map(t => buildFpTira(t)).join('');

  sheet.innerHTML = `
    <div class="fp-header">
      <img class="fp-logo" src="data:image/png;base64,${LOGO_B64}" alt="Cetiras">
      <div class="fp-client-block">
        <span class="fp-client-label">CLIENTE</span>
        <div class="fp-client-name">${escHtml(cliente) || '&nbsp;'}</div>
      </div>
    </div>
    <div class="fp-date">DATA: ${escHtml(data)}</div>
    ${tirasHtml}
  `;
}

function buildFpTira(t) {
  const photoDiv = t.foto
    ? `<div class="fp-photo" style="background-image:url('${t.foto}')"></div>`
    : `<div class="fp-photo-empty">foto</div>`;

  const preco = t.preco ? 'R$ ' + t.preco : '';
  const tipoPreco = t.tipoPreco || 'PREÇO (m)';

  let extraRows = '';
  if (currentType === 'consumo') {
    let consumoContent = '';
    if (t.consumos && t.consumos.length > 0) {
      consumoContent = `<div class="fp-consumo-lines">${t.consumos.map(c => `<div class="fp-consumo-line">${escHtml(c)}</div>`).join('')}</div>`;
    }
    extraRows = `<div class="fp-row">
      <div class="fp-row-label">Consumo</div>
      <div class="fp-row-value">${consumoContent}</div>
    </div>`;
  }

  return `<div class="fp-tira">
    ${photoDiv}
    <div class="fp-info">
      <div class="fp-row">
        <div class="fp-row-label">Referência</div>
        <div class="fp-row-value">${escHtml(t.ref)}</div>
      </div>
      <div class="fp-row">
        <div class="fp-row-label">${escHtml(tipoPreco)}</div>
        <div class="fp-row-value">${escHtml(preco)}</div>
      </div>
      ${extraRows}
    </div>
  </div>`;
}

/* ===================== EXCEL ===================== */
function cellRef(row, col) {
  return String.fromCharCode(65 + col) + (row + 1);
}
function setVal(ws, ref, val) {
  if (!ws[ref]) ws[ref] = {};
  ws[ref].v = val;
  ws[ref].t = 's';
  delete ws[ref].w;
}

function downloadExcel() {
  const cliente = (document.getElementById('inp-cliente').value || '').toUpperCase();
  const data = document.getElementById('inp-data').value || '';
  showMsg('', '');

  try {
    const raw = atob(MODELO_PRECO_B64);
    const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    const wb = XLSX.read(arr, { type: 'array', cellStyles: true });
    const ws = wb.Sheets[wb.SheetNames[0]];

    // Cliente e data
    setVal(ws, 'F3', cliente);
    setVal(ws, 'A6', 'DATA: ' + data);

    if (currentType === 'preco') {
      const ROWS = [8, 15, 22, 29, 36, 43, 50];
      for (let i = 0; i < qty; i++) {
        const t = tirasData[i];
        const row = ROWS[i];
        if (row === undefined) continue;
        setVal(ws, cellRef(row - 1, 4), 'REFERÊNCIA');
        setVal(ws, cellRef(row - 1, 8), t.tipoPreco || 'PREÇO (m)');
        setVal(ws, cellRef(row, 4), t.ref || '');
        const pv = t.preco ? 'R$ ' + t.preco : '';
        setVal(ws, cellRef(row, 8), pv);
      }
    } else {
      // consumo type — same model for now, fill what we can
      const ROWS = [8, 15, 22, 29, 36, 43, 50, 57, 64, 71];
      for (let i = 0; i < qty; i++) {
        const t = tirasData[i];
        const row = ROWS[i];
        if (row === undefined) continue;
        setVal(ws, cellRef(row - 1, 4), 'REFERÊNCIA');
        setVal(ws, cellRef(row - 1, 8), t.tipoPreco || 'PREÇO (m)');
        setVal(ws, cellRef(row, 4), t.ref || '');
        const pv = t.preco ? 'R$ ' + t.preco : '';
        setVal(ws, cellRef(row, 8), pv);
        if (t.consumos && t.consumos.length > 0) {
          setVal(ws, cellRef(row + 1, 4), 'CONSUMO');
          setVal(ws, cellRef(row + 1, 8), t.consumos.join(' / '));
        }
      }
    }

    const slug = cliente.replace(/\s+/g, '_') || 'CLIENTE';
    const dt = data.replace(/\//g, '-') || 'data';
    XLSX.writeFile(wb, `Ficha_${slug}_${dt}.xlsx`);
    showMsg('Excel gerado com sucesso!', 'success');
  } catch(e) {
    showMsg('Erro ao gerar Excel: ' + e.message, 'error');
  }
}

/* ===================== PDF ===================== */
async function downloadPDF() {
  showMsg('Gerando PDF...', 'success');
  try {
    const el = document.getElementById('sheet-preview');
    const canvas = await html2canvas(el, {
      scale: 3,
      backgroundColor: '#ffffff',
      useCORS: true,
      allowTaint: true,
      logging: false
    });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pW = pdf.internal.pageSize.getWidth() - 20;
    const pH = pdf.internal.pageSize.getHeight() - 20;
    const ratio = canvas.width / canvas.height;
    const iW = pW;
    const iH = iW / ratio;

    if (iH <= pH) {
      pdf.addImage(imgData, 'PNG', 10, 10, iW, iH);
    } else {
      const pages = Math.ceil(iH / pH);
      for (let p = 0; p < pages; p++) {
        if (p > 0) pdf.addPage();
        const srcY = (p * pH / iH) * canvas.height;
        const srcH = Math.min((pH / iH) * canvas.height, canvas.height - srcY);
        const pc = document.createElement('canvas');
        pc.width = canvas.width; pc.height = srcH;
        pc.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
        const pageH = (srcH / canvas.height) * iH;
        pdf.addImage(pc.toDataURL('image/png'), 'PNG', 10, 10, iW, pageH);
      }
    }

    const cliente = (document.getElementById('inp-cliente').value || 'CLIENTE').toUpperCase();
    const data = document.getElementById('inp-data').value || 'data';
    const slug = cliente.replace(/\s+/g, '_');
    const dt = data.replace(/\//g, '-');
    pdf.save(`Ficha_${slug}_${dt}.pdf`);
    showMsg('PDF gerado com sucesso!', 'success');
  } catch(e) {
    showMsg('Erro ao gerar PDF: ' + e.message, 'error');
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('msg-area');
  el.innerHTML = msg ? `<div class="msg ${type}">${msg}</div>` : '';
}

init();
</script>
