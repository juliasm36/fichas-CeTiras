<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Fichas de Preço</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
:root { --bg:#0f0f0f; --surface:#181818; --surface2:#222; --border:#2e2e2e; --accent:#d4ff00; --accent2:#ff6b35; --text:#f0f0f0; --muted:#888; }
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:40px 20px}
header{max-width:760px;margin:0 auto 40px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:20px}
header h1{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1.1}
header h1 span{color:var(--accent)}
header p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right}
.container{max-width:760px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.card-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
.row{display:flex;gap:14px;margin-bottom:14px}
.row:last-child{margin-bottom:0}
.field{flex:1;display:flex;flex-direction:column;gap:6px}
.field.narrow{flex:0 0 150px}
.field.xnarrow{flex:0 0 120px}
label{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
input[type="text"]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--accent)}

/* Tipo selector */
.tipo-selector{display:flex;gap:10px;margin-bottom:0}
.tipo-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.tipo-btn:hover{border-color:#555;color:var(--text)}
.tipo-btn.active{border-color:var(--accent);color:var(--accent);background:#1a1f00}

/* Strips */
.strips-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.strips-header .card-title{margin-bottom:0}
.strip-count-ctrl{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.btn-round{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;line-height:1}
.btn-round:hover{border-color:var(--accent);background:#1e2200}
.strip{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;position:relative;transition:border-color .2s}
.strip:hover{border-color:#3e3e3e}
.strip-num{position:absolute;top:-9px;left:12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:var(--surface2);padding:2px 7px;border-radius:20px;border:1px solid var(--border);letter-spacing:1px}
.strip .row{margin-bottom:10px}
.strip .row:last-child{margin-bottom:0}
.img-upload{border:1px dashed var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.img-upload:hover{border-color:var(--accent);background:#1a1f00;color:var(--accent)}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-preview{display:none;align-items:center;gap:10px;margin-top:8px}
.img-preview img{width:44px;height:44px;object-fit:cover;border-radius:5px;border:1px solid var(--border)}
.img-preview span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;transition:color .2s}
.img-clear:hover{color:var(--accent2)}

/* Consumo extra */
.consumo-extra{display:flex;gap:8px;margin-top:6px}
.consumo-extra input{flex:1;font-size:12px;padding:7px 10px}
.consumo-extra .btn-add-consumo{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:11px;padding:4px 10px;font-family:'DM Mono',monospace;transition:border-color .2s,color .2s;white-space:nowrap}
.consumo-extra .btn-add-consumo:hover{border-color:var(--accent);color:var(--accent)}
.consumo-list{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.consumo-item{display:flex;align-items:center;gap:6px}
.consumo-item span{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);flex:1}
.consumo-item button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 4px;transition:color .2s}
.consumo-item button:hover{color:var(--accent2)}

/* Preview */
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:16px}
.preview-title{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.preview-sheet{background:white;border-radius:6px;padding:14px;color:#111;font-family:Arial,sans-serif;font-size:11px}
.ps-header{display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #ddd}
.ps-cliente{font-size:12px;font-weight:bold}
.ps-data{font-size:10px;color:#666}
.ps-strip{display:flex;border:1px solid #ccc;margin-bottom:5px;border-radius:3px;overflow:hidden;min-height:40px}
.ps-img{width:70px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;border-right:1px solid #ddd;flex-shrink:0;overflow:hidden}
.ps-img img{width:100%;height:100%;object-fit:cover}
.ps-body{flex:1;display:flex}
.ps-labels{width:90px;border-right:1px solid #ddd;padding:3px 6px;display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0}
.ps-labels div{font-size:8px;font-weight:bold;font-style:italic;color:#333}
.ps-values{flex:1;padding:3px 6px;display:flex;flex-direction:column;justify-content:space-around}
.ps-values div{font-size:10px;color:#111}

/* Generate */
.btn-generate{width:100%;padding:15px;background:var(--accent);color:#0f0f0f;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:transform .15s,opacity .15s;margin-top:6px}
.btn-generate:hover{opacity:.9;transform:translateY(-1px)}
.btn-generate:active{transform:translateY(0)}
.status{margin-top:10px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:center;min-height:16px;transition:color .3s}
.status.ok{color:var(--accent)}
.status.err{color:var(--accent2)}
</style>
</head>
<body>
<header>
  <h1>Fichas de<br><span>Preço</span></h1>
  <p>Digital · Exporta .xlsx<br>máx 7 tiras (preço) · 10 tiras (consumo)</p>
</header>
<div class="container">

  <!-- Tipo -->
  <div class="card">
    <div class="card-title">// tipo de ficha</div>
    <div class="tipo-selector">
      <button class="tipo-btn active" id="btn-preco" onclick="setTipo('preco')">💰 Só com Preço</button>
      <button class="tipo-btn" id="btn-consumo" onclick="setTipo('consumo')">📐 Com Consumo</button>
    </div>
  </div>

  <!-- Dados gerais -->
  <div class="card">
    <div class="card-title">// dados gerais</div>
    <div class="row">
      <div class="field"><label>Cliente</label><input type="text" id="cliente" placeholder="Nome do cliente" oninput="updatePreview()"></div>
      <div class="field narrow"><label>Data</label><input type="text" id="data" placeholder="DD/MM/AAAA"></div>
    </div>
  </div>

  <!-- Tiras -->
  <div class="card">
    <div class="strips-header">
      <div class="card-title">// tiras</div>
      <div class="strip-count-ctrl">
        <button class="btn-round" onclick="removeStrip()">−</button>
        <span id="strip-count">1</span>
        <button class="btn-round" onclick="addStrip()">+</button>
      </div>
    </div>
    <div id="strips-container"></div>
  </div>

  <!-- Preview -->
  <div class="preview-card">
    <div class="preview-title">// pré-visualização</div>
    <div class="preview-sheet">
      <div class="ps-header">
        <div class="ps-cliente" id="prev-cliente">—</div>
        <div class="ps-data" id="prev-data">—</div>
      </div>
      <div id="prev-strips"></div>
    </div>
  </div>

  <button class="btn-generate" onclick="generateExcel()">⬇ Baixar Excel (.xlsx)</button>
  <div class="status" id="status"></div>
</div>

let tipo = 'preco';
let stripCount = 0;
let stripData = [];

function today(){
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}
document.getElementById('data').value = today();

function setTipo(t){
  tipo = t;
  document.getElementById('btn-preco').classList.toggle('active', t==='preco');
  document.getElementById('btn-consumo').classList.toggle('active', t==='consumo');
  // Reset strips
  stripCount = 0;
  stripData = [];
  document.getElementById('strips-container').innerHTML = '';
  document.getElementById('strip-count').textContent = '0';
  addStrip();
  updatePreview();
}

function maxStrips(){ return tipo==='preco' ? 7 : 10; }

function addStrip(){
  if(stripCount >= maxStrips()){ setStatus('Máximo de '+maxStrips()+' tiras para este modelo.','err'); return; }
  stripCount++;
  stripData.push({ref:'', price:'', consumo:[], imgData:null, imgName:''});
  renderStrips();
  updatePreview();
}

function removeStrip(){
  if(stripCount<=1) return;
  stripCount--;
  stripData.pop();
  renderStrips();
  updatePreview();
}

function renderStrips(){
  const c=document.getElementById('strips-container');
  c.innerHTML='';
  document.getElementById('strip-count').textContent=stripCount;
  for(let i=0;i<stripCount;i++){
    const d=stripData[i];
    const div=document.createElement('div');
    div.className='strip';

    let consumoHtml='';
    if(tipo==='consumo'){
      const cItems = d.consumo.map((cv,ci)=>`
        <div class="consumo-item">
          <span>${cv}</span>
          <button onclick="removeConsumo(${i},${ci})">✕</button>
        </div>`).join('');
      consumoHtml=`
        <div class="row">
          <div class="field">
            <label>Consumo (m²)</label>
            <div style="display:flex;gap:6px">
              <input type="text" id="consumo-input-${i}" placeholder="Ex: 0,134 m² ou TIRA MARROM: 0,07 m²" style="flex:1;font-size:12px;padding:7px 10px">
              <button class="btn-round" onclick="addConsumo(${i})" style="width:auto;padding:0 12px;border-radius:8px;font-size:20px">+</button>
            </div>
            <div class="consumo-list" id="consumo-list-${i}">${cItems}</div>
          </div>
        </div>`;
    }

    div.innerHTML=`
      <div class="strip-num">TIRA ${i+1}</div>
      <div class="row" style="margin-top:8px">
        <div class="field"><label>Referência</label>
          <input type="text" value="${d.ref}" placeholder="Ex: REF-001" oninput="stripData[${i}].ref=this.value;updatePreview()">
        </div>
        <div class="field xnarrow"><label>Preço / m</label>
          <input type="text" value="${d.price}" placeholder="Ex: 45,90" oninput="stripData[${i}].price=this.value;updatePreview()">
        </div>
      </div>
      ${consumoHtml}
      <div class="row">
        <div class="field"><label>Foto (opcional)</label>
          <div class="img-upload">
            <input type="file" accept="image/*" onchange="handleImg(event,${i})">
            clique para adicionar foto
          </div>
          <div class="img-preview" id="img-preview-${i}">
            <img id="img-thumb-${i}" src="">
            <span id="img-name-${i}"></span>
            <button class="img-clear" onclick="clearImg(${i})">✕</button>
          </div>
        </div>
      </div>`;
    c.appendChild(div);
    if(d.imgData){
      document.getElementById(`img-preview-${i}`).style.display='flex';
      document.getElementById(`img-thumb-${i}`).src=d.imgData;
      document.getElementById(`img-name-${i}`).textContent=d.imgName;
    }
  }
}

function addConsumo(idx){
  const inp=document.getElementById(`consumo-input-${idx}`);
  const val=inp.value.trim();
  if(!val) return;
  stripData[idx].consumo.push(val);
  inp.value='';
  renderStrips();
  updatePreview();
}

function removeConsumo(stripIdx, consumoIdx){
  stripData[stripIdx].consumo.splice(consumoIdx,1);
  renderStrips();
  updatePreview();
}

function handleImg(event,idx){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    stripData[idx].imgData=e.target.result;
    stripData[idx].imgName=file.name;
    document.getElementById(`img-preview-${idx}`).style.display='flex';
    document.getElementById(`img-thumb-${idx}`).src=e.target.result;
    document.getElementById(`img-name-${idx}`).textContent=file.name;
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function clearImg(idx){
  stripData[idx].imgData=null;
  stripData[idx].imgName='';
  document.getElementById(`img-preview-${idx}`).style.display='none';
  updatePreview();
}

function updatePreview(){
  const cliente=document.getElementById('cliente').value||'—';
  const data=document.getElementById('data').value||'—';
  document.getElementById('prev-cliente').textContent=cliente;
  document.getElementById('prev-data').textContent='Data: '+data;
  const container=document.getElementById('prev-strips');
  container.innerHTML='';
  for(let i=0;i<stripCount;i++){
    const d=stripData[i];
    const div=document.createElement('div');
    div.className='ps-strip';
    const consumoVal = d.consumo.length ? d.consumo.join(' / ') : '—';
    const consumoRow = tipo==='consumo' ? `<div>${consumoVal}</div>` : '';
    const labelConsumo = tipo==='consumo' ? `<div>CONSUMO</div>` : '';
    div.innerHTML=`
      <div class="ps-img">${d.imgData?`<img src="${d.imgData}">`:'foto'}</div>
      <div class="ps-body">
        <div class="ps-labels">
          <div>REFERÊNCIA</div>
          <div>PREÇO</div>
          ${labelConsumo}
        </div>
        <div class="ps-values">
          <div>${d.ref||'—'}</div>
          <div>${d.price?'R$ '+d.price:'—'}</div>
          ${consumoRow}
        </div>
      </div>`;
    container.appendChild(div);
  }
}

function setStatus(msg,type=''){
  const el=document.getElementById('status');
  el.textContent=msg;
  el.className='status '+type;
}

function b64ToArrayBuffer(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}

// Strip positions - SÓ COM PREÇO: val at row+1 (0-based), ref=E col(4), price=I col(8)
const ROWS_PRECO = [7,13,20,27,34,41,48]; // 0-based (rows 8,14,21,28,35,42,49 in Excel)

// Strip positions - COM CONSUMO: starts at row (0-based), ref=G row, price=G row+2, consumo=G row+4
// E col(4) = label, G col(6) = value
const ROWS_CONSUMO = [7,14,21,28,35,42,54,61,68,75]; // 0-based

function cellRef(row,col){
  return String.fromCharCode(65+col)+(row+1);
}

function setVal(ws,ref,val){
  if(!ws[ref]) ws[ref]={};
  ws[ref].v=val;
  ws[ref].t='s';
  if(ws[ref].w!==undefined) delete ws[ref].w;
}

function generateExcel(){
  const cliente=document.getElementById('cliente').value.trim();
  const data=document.getElementById('data').value.trim();
  if(!cliente){setStatus('Informe o nome do cliente.','err');return;}
  setStatus('Gerando arquivo...','');
  try{
    const modelB64 = tipo==='preco' ? MODELO_PRECO : MODELO_CONSUMO;
    const ab=b64ToArrayBuffer(modelB64);
    const wb=XLSX.read(ab,{type:'array',cellStyles:true,cellNF:true});
    const ws=wb.Sheets['Plan1'];

    setVal(ws,'F3',cliente);
    setVal(ws,'A6','DATA: '+data);

    if(tipo==='preco'){
      ROWS_PRECO.forEach((row,i)=>{
        const d = i<stripCount ? stripData[i] : null;
        setVal(ws, cellRef(row+1,4), d ? d.ref : '');   // E(row+2)
        setVal(ws, cellRef(row+1,8), d ? (d.price?'R$ '+d.price:'') : ''); // I(row+2)
      });
    } else {
      ROWS_CONSUMO.forEach((row,i)=>{
        const d = i<stripCount ? stripData[i] : null;
        setVal(ws, cellRef(row,6), d ? d.ref : '');          // G = ref
        setVal(ws, cellRef(row+2,6), d ? (d.price?'R$ '+d.price:'') : ''); // G+2 = price
        // Consumo: first line in G+4, second in G+5 if exists
        if(d && d.consumo.length>0){
          setVal(ws, cellRef(row+4,6), d.consumo[0]);
          setVal(ws, cellRef(row+5,6), d.consumo.length>1 ? d.consumo[1] : '');
        } else {
          setVal(ws, cellRef(row+4,6), '');
          setVal(ws, cellRef(row+5,6), '');
        }
      });
    }

    const dataSlug=data.replace(/\//g,'-');
    const clienteSlug=cliente.replace(/\s+/g,'_');
    const suffix = tipo==='preco'?'SóPreço':'ComConsumo';
    XLSX.writeFile(wb,`Ficha_${clienteSlug}_${suffix}_${dataSlug}.xlsx`);
    setStatus('✓ Arquivo gerado com sucesso!','ok');
  } catch(e){
    setStatus('Erro: '+e.message,'err');
    console.error(e);
  }
}

addStrip();
</script>
